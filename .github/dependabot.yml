version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Oslo
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
    groups:
      toolchain-core:
        patterns:
          - next
          - eslint-config-next
          - '@next/third-parties'
          - eslint
          - typescript
          - typescript-eslint
          - '@typescript-eslint/*'
        update-types:
          - minor
          - patch
