name: Google Merchant Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: google-merchant-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Trigger production Merchant sync
        run: |
          curl --fail-with-body -sS \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${MERCHANT_SYNC_BASE_URL}/api/cron/sync-google-merchant"
        env:
          MERCHANT_SYNC_BASE_URL: ${{ secrets.MERCHANT_SYNC_BASE_URL }}
