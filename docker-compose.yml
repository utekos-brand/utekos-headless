name: utekos-headless

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      args:
        NODE_VERSION: ${NODE_VERSION:-24.14.0-slim}
    image: utekos-headless:dev
    init: true
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_DEV_POLLING: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
      - pnpm_store:/pnpm/store
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    develop:
      watch:
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./pnpm-lock.yaml
        - action: rebuild
          path: ./scripts/docker/dev-entrypoint.sh

  web-prod:
    profiles:
      - prod
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        NODE_VERSION: ${NODE_VERSION:-24.14.0-slim}
      secrets:
        - app_env
    image: utekos-headless:prod
    init: true
    ports:
      - "${PROD_PORT:-3001}:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  node_modules:
  next_cache:
  pnpm_store:

secrets:
  app_env:
    file: ./.env.local
